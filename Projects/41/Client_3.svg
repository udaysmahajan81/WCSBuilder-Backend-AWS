<svg width="700" height="500" xmlns="http://www.w3.org/2000/svg">

  <!-- Boundary -->
  <polygon points="10,10 600,10 600,200 400,200 400,480 10,480"
           fill="none" stroke="green" stroke-width="3"/>

  <!-- Inbound -->
  <rect x="20" y="20" width="200" height="50"
        fill="none" stroke="blue" stroke-width="2"/>
  <text x="60" y="50">Inbound</text>

  <!-- Outbound -->
  <rect x="420" y="430" width="150" height="40"
        fill="none" stroke="red" stroke-width="2"/>
  <text x="440" y="455">Outbound</text>

  <!-- Pillars -->
  <rect x="200" y="250" width="20" height="20" fill="black"/>
  <rect x="350" y="150" width="20" height="20" fill="black"/>
  <rect x="120" y="350" width="20" height="20" fill="black"/>

</svg>